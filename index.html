<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學測英文作文 AI 評審台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50 min-h-screen">
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40 p-4">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <h1 class="text-lg font-bold">學測英文作文 AI 評審台</h1>
      <button onclick="document.getElementById('settings-modal').classList.remove('hidden')" class="p-2 bg-indigo-600 text-white rounded-xl">⚙️ 設定</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <input type="text" id="student-name" placeholder="學生姓名" class="w-full p-3 border rounded-xl">
        <input type="text" id="writing-topic" placeholder="作文題目" class="w-full p-3 border rounded-xl">
        <textarea id="essay-content" placeholder="請輸入英文作文..." class="w-full h-64 p-3 border rounded-xl"></textarea>
        <button onclick="startAIEvaluation()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl">開始 AI 專業評分</button>
      </div>
      <div id="eval-result" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
        <h2 id="eval-title" class="text-lg font-bold mb-4">評分結果</h2>
        <div id="eval-content" class="text-slate-700 leading-relaxed">請先輸入作文並點擊評分。</div>
      </div>
    </div>
  </main>

  <!-- 設定視窗：確保這裡有兩個欄位 -->
  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/50">
    <div class="bg-white p-8 rounded-2xl max-w-md w-full mx-4 shadow-xl">
      <h2 class="text-xl font-bold mb-6">連線設定</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold mb-2">1. GAS API 部署網址</label>
          <input type="password" id="cfg-gas-url" class="w-full p-3 border rounded-xl" placeholder="https://script.google.com/...">
        </div>
        <div>
          <label class="block text-sm font-bold mb-2">2. Gemini API 金鑰 (API Key)</label>
          <input type="password" id="cfg-api-key" class="w-full p-3 border rounded-xl" placeholder="AIzaSy...">
        </div>
      </div>
      <div class="mt-8 flex justify-end space-x-3">
        <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="px-4 py-2 bg-slate-200 rounded-xl">取消</button>
        <button onclick="saveSettings()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl">儲存設定</button>
      </div>
    </div>
  </div>

  <script>
    function saveSettings() {
      localStorage.setItem('gas_url', document.getElementById('cfg-gas-url').value);
      localStorage.setItem('gemini_api_key', document.getElementById('cfg-api-key').value);
      alert("設定已儲存！");
      document.getElementById('settings-modal').classList.add('hidden');
    }

    async function startAIEvaluation() {
      const apiKey = localStorage.getItem('gemini_api_key');
      const topic = document.getElementById('writing-topic').value;
      const essay = document.getElementById('essay-content').value;

      if (!apiKey) return alert("請先點擊右上角「設定」填寫 Gemini API Key！");
      
      document.getElementById('eval-content').innerText = "AI 老師閱卷中...";
      
      const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      try {
        const response = await fetch(apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts: [{ text: `題目:${topic}\n作文:${essay}\n請給分並評析` }] }] })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        document.getElementById('eval-content').innerText = data.candidates[0].content.parts[0].text;
      } catch (err) {
        alert("評分異常：" + err.message);
      }
    }

    // 頁面載入自動讀取設定
    window.onload = () => {
      document.getElementById('cfg-gas-url').value = localStorage.getItem('gas_url') || "";
      document.getElementById('cfg-api-key').value = localStorage.getItem('gemini_api_key') || "";
    };
  </script>
</body>
</html>
