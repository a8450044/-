<!DOCTYPE html> 
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>學測英文作文 AI 評審台</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4">
  <div class="max-w-4xl mx-auto space-y-6">
    <header class="flex justify-between items-center bg-white p-6 rounded-2xl shadow-sm border">
      <h1 class="text-xl font-bold">學測英文作文 AI 評審台</h1>
      <button onclick="document.getElementById('settings').classList.toggle('hidden')" class="px-4 py-2 bg-slate-200 rounded-lg text-sm font-bold">⚙️ 設定 API Key</button>
    </header>

    <div id="settings" class="hidden bg-white p-6 rounded-2xl shadow-sm border space-y-4">
      <input type="password" id="api-key" placeholder="輸入 Gemini API Key (AIzaSy...)" class="w-full p-3 border rounded-xl">
      <button onclick="saveKey()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl">儲存設定</button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
        <input type="text" id="name" placeholder="學生姓名" class="w-full p-3 border rounded-xl">
        <input type="text" id="topic" placeholder="作文題目" class="w-full p-3 border rounded-xl">
        <textarea id="essay" placeholder="貼上英文作文..." class="w-full h-64 p-3 border rounded-xl"></textarea>
        <button onclick="evaluateEssay()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl">開始 AI 評分</button>
      </div>
      <div id="result" class="bg-white p-6 rounded-2xl shadow-sm border text-slate-700 whitespace-pre-wrap">
        <h2 class="font-bold mb-2">評分報告</h2>
        <div id="output">等待輸入中...</div>
      </div>
    </div>
  </div>

  <script>
    function saveKey() {
      localStorage.setItem('gemini_key', document.getElementById('api-key').value.trim());
      alert("金鑰已儲存！");
    }
    window.onload = () => { document.getElementById('api-key').value = localStorage.getItem('gemini_key') || ""; };

    async function evaluateEssay() {
      const key = localStorage.getItem('gemini_key');
      const essay = document.getElementById('essay').value;
      const topic = document.getElementById('topic').value;
      const output = document.getElementById('output');

      if (!key) return alert("請先點擊上方「設定 API Key」按鈕輸入金鑰");
      output.innerText = "AI 正在進行學測標準批改，請稍候...";

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            contents: [{ parts: [{ text: `請模擬學測閱卷老師，對以下題目與作文給予詳細評分。請回傳 JSON 格式：{"score": "XX/20", "comment": "詳細評析內容"}。題目：${topic}，作文：${essay}` }] }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });
        const data = await response.json();
        if (data.error) throw new Error(data.error.message);
        
        const result = JSON.parse(data.candidates[0].content.parts[0].text);
        output.innerHTML = `<p class='text-xl font-bold text-blue-600'>分數：${result.score}</p><p class='mt-2'>${result.comment}</p>`;
      } catch (e) {
        output.innerText = "評分發生錯誤：" + e.message;
      }
    }
  </script>
</body>
</html>
