<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學測英文作文自學與 AI 專業評分系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: #F1F5F9; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col custom-scrollbar text-slate-800">

  <!-- 頂部導覽列 -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-40 shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md">
          <i data-lucide="graduation-cap" class="w-6 h-6"></i>
        </div>
        <div>
          <h1 class="text-lg font-bold text-slate-900 tracking-tight">學測英文作文 AI 評審台</h1>
          <p class="text-xs text-indigo-600 font-medium">大考閱卷標準 • 寫作自學自測平台</p>
        </div>
      </div>
      <div class="flex items-center space-x-3">
        <div id="gas-status-badge" class="hidden sm:flex items-center space-x-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-amber-50 text-amber-700 border border-amber-200">
          <span id="gas-status-text">GAS 未連線</span>
        </div>
        <div id="ai-status-badge" class="flex items-center space-x-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-sky-50 text-sky-700 border border-sky-200">
          <span id="ai-status-text">Canvas 預覽免 Key 模式</span>
        </div>
        <button onclick="openModal('settings-modal')" class="p-2 text-slate-500 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition" title="連線與 API 設定">
          <i data-lucide="settings" class="w-5 h-5"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- 主內容區 -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
      
      <!-- 左側：輸入編輯器 -->
      <div class="lg:col-span-5 flex flex-col space-y-6">
        <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex flex-col space-y-5">
          <h2 class="text-md font-bold text-slate-900 flex items-center space-x-2 border-b border-slate-100 pb-3">
            <i data-lucide="edit-3" class="w-5 h-5 text-indigo-600"></i>
            <span>新文章寫作上傳</span>
          </h2>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">學生姓名</label>
            <input type="text" id="student-name" placeholder="請輸入姓名或學號" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">寫作題目 / 提示引導</label>
            <input type="text" id="writing-topic" placeholder="例如：放天燈的啟示" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
          </div>
          <div class="flex-grow flex flex-col">
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">英文作文內文</label>
            <textarea id="essay-content" placeholder="請在此輸入您的英文作文..." class="w-full h-64 px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none font-mono"></textarea>
          </div>
          <button onclick="startAIEvaluation()" class="w-full py-3.5 px-6 bg-gradient-to-r from-indigo-600 to-violet-600 hover:from-indigo-700 text-white font-bold rounded-2xl shadow-lg transition flex items-center justify-center space-x-2">
            <i data-lucide="sparkles" class="w-5 h-5"></i>
            <span>開始 AI 專業評分</span>
          </button>
        </div>
      </div>

      <!-- 右側：報告產出 -->
      <div class="lg:col-span-7 flex flex-col">
        <div id="eval-placeholder" class="bg-white rounded-2xl border border-slate-200 p-12 text-center shadow-sm flex flex-col items-center justify-center flex-grow min-h-[400px]">
          <h3 class="text-lg font-bold text-slate-900 mb-2">待命中的 AI 教師</h3>
          <p class="text-sm text-slate-500">請在左側輸入文章，並點擊「開始 AI 專業評分」。</p>
        </div>
        <div id="eval-loading" class="hidden bg-white rounded-2xl border border-slate-200 p-12 text-center flex-grow min-h-[400px] flex items-center justify-center">
          <p class="text-lg font-bold text-indigo-600 animate-pulse">AI 老師正在閱卷中，請稍候...</p>
        </div>
        <div id="eval-result" class="hidden bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex flex-col space-y-6">
          <h3 class="text-lg font-bold text-slate-900">總分：<span id="score-total" class="text-2xl text-indigo-600"></span> / 20</h3>
          <p id="teacher-overall-comment" class="text-sm text-slate-700 leading-relaxed"></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal：連線設定 ⚙️ (這裡一定有兩欄！) -->
  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="closeModal('settings-modal')"></div>
    <div class="bg-white rounded-2xl shadow-xl max-w-lg w-full mx-4 overflow-hidden relative z-10 border border-slate-100 max-h-[90vh] flex flex-col">
      <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
        <h3 class="text-md font-bold text-slate-900">連線設定 & 參數配置</h3>
        <button onclick="closeModal('settings-modal')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div class="p-6 space-y-5 overflow-y-auto custom-scrollbar flex-grow">
        
        <!-- 第一欄：GAS Web App URL -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">1. Google Apps Script API 部署網址</label>
          <input type="password" id="cfg-gas-url" placeholder="貼上您的 Web App URL" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

        <!-- 第二欄：Gemini API Key (保證出現) -->
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">2. Gemini API 金鑰 (API Key)</label>
          <input type="password" id="cfg-api-key" placeholder="貼上您的 Gemini API Key" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>

      </div>
      <div class="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
        <button onclick="saveSettingsForm()" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl text-xs shadow-md shadow-indigo-100 transition">
          儲存設定
        </button>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_GAS_URL = ""; 
    let gasUrl = "";
    let geminiApiKey = "";

    window.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      checkUrlParamsSync();
      loadConfiguration();
    });

    function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
    function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

    function checkUrlParamsSync() {
      const urlParams = new URLSearchParams(window.location.search);
      const configParam = urlParams.get('config');
      if (configParam) {
        try {
          const decoded = decodeURIComponent(atob(configParam.trim()));
          const parts = decoded.split('||');
          if (parts[0]) {
            localStorage.setItem('gas_url', parts[0].trim());
            if (parts[1]) localStorage.setItem('gemini_api_key', parts[1].trim());
            window.history.replaceState({}, document.title, window.location.origin + window.location.pathname);
            alert("一鍵設定成功！參數已匯入。");
          }
        } catch (error) {}
      }
    }

    function loadConfiguration() {
      gasUrl = localStorage.getItem('gas_url') || DEFAULT_GAS_URL;
      geminiApiKey = localStorage.getItem('gemini_api_key') || "";
      document.getElementById('cfg-gas-url').value = gasUrl;
      document.getElementById('cfg-api-key').value = geminiApiKey;
      
      if(geminiApiKey) {
        document.getElementById('ai-status-text').textContent = "API 金鑰已配置";
        document.getElementById('ai-status-badge').className = "flex items-center space-x-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200";
      }
    }

    function saveSettingsForm() {
      const inputGas = document.getElementById('cfg-gas-url').value.trim();
      const inputKey = document.getElementById('cfg-api-key').value.trim();
      if (inputGas) localStorage.setItem('gas_url', inputGas); else localStorage.removeItem('gas_url');
      if (inputKey) localStorage.setItem('gemini_api_key', inputKey); else localStorage.removeItem('gemini_api_key');
      closeModal('settings-modal');
      alert("設定已儲存！");
      loadConfiguration();
    }

    async function startAIEvaluation() {
      const studentName = document.getElementById('student-name').value.trim() || "匿名";
      const topic = document.getElementById('writing-topic').value.trim();
      const essayText = document.getElementById('essay-content').value.trim();

      if (!topic || !essayText) return alert("請填寫題目與內文！");
      if (!geminiApiKey) return alert("錯誤：您尚未在右上角 ⚙️ 設定輸入 Gemini API Key！");

      document.getElementById('eval-placeholder').classList.add('hidden');
      document.getElementById('eval-result').classList.add('hidden');
      document.getElementById('eval-loading').classList.remove('hidden');

      const systemPrompt = `請以學測標準批改以下英文作文，給予總分(20分)與中文評語。返回格式必須為純文字 JSON：{"scores":{"total":15},"overall_teacher_comment":"評語內容"}`;
      const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiApiKey}`;
      
      const payload = {
        contents: [{ role: "user", parts: [{ text: `姓名:${studentName}\n題目:${topic}\n內文:${essayText}` }] }],
        systemInstruction: { parts: [{ text: systemPrompt }] },
        generationConfig: { responseMimeType: "application/json" }
      };

      try {
        const response = await fetch(apiEndpoint, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || response.status);
        }
        const data = await response.json();
        let rawText = data.candidates[0].content.parts[0].text.trim();
        if (rawText.startsWith("```json")) rawText = rawText.substring(7);
        if (rawText.startsWith("```")) rawText = rawText.substring(3);
        if (rawText.endsWith("```")) rawText = rawText.substring(0, rawText.length - 3);
        
        const result = JSON.parse(rawText.trim());
        document.getElementById('eval-loading').classList.add('hidden');
        document.getElementById('eval-result').classList.remove('hidden');
        document.getElementById('score-total').textContent = result.scores.total;
        document.getElementById('teacher-overall-comment').textContent = result.overall_teacher_comment;
      } catch (err) {
        document.getElementById('eval-loading').classList.add('hidden');
        document.getElementById('eval-placeholder').classList.remove('hidden');
        alert("API 呼叫失敗，請檢查 API Key 是否正確！\n錯誤訊息：" + err.message);
      }
    }
  </script>
</body>
</html>
