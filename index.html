<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>學測英文作文 AI 評審台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <header class="bg-white border-b border-slate-200 sticky top-0 z-40 p-4 shadow-sm">
    <div class="max-w-7xl mx-auto flex items-center justify-between">
      <h1 class="text-lg font-bold text-slate-900">學測英文作文 AI 評審台</h1>
      <button onclick="document.getElementById('settings-modal').classList.remove('hidden')" class="px-4 py-2 bg-indigo-600 text-white rounded-xl font-bold text-sm">⚙️ 設定金鑰</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-4 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm space-y-4">
        <input type="text" id="student-name" placeholder="學生姓名" class="w-full p-3 border rounded-xl">
        <input type="text" id="writing-topic" placeholder="作文題目" class="w-full p-3 border rounded-xl">
        <textarea id="essay-content" placeholder="請輸入英文作文..." class="w-full h-64 p-3 border rounded-xl"></textarea>
        <button onclick="startAIEvaluation()" class="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition">開始 AI 專業評分</button>
      </div>
      
      <div id="eval-result" class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm min-h-[400px]">
        <h2 class="text-lg font-bold mb-4">完整評分報告</h2>
        <div id="score-display" class="text-2xl font-bold text-indigo-600 mb-4"></div>
        <div id="eval-content" class="text-slate-700 leading-relaxed whitespace-pre-wrap">請輸入作文並點擊評分，AI 將為您進行詳細解析。</div>
      </div>
    </div>
  </main>

  <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden bg-slate-900/50">
    <div class="bg-white p-8 rounded-2xl max-w-md w-full mx-4 shadow-xl">
      <h2 class="text-xl font-bold mb-6">API 設定</h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-bold mb-2">Gemini API 金鑰</label>
          <input type="password" id="cfg-api-key" class="w-full p-3 border rounded-xl" placeholder="請貼上您的 AIzaSy... 金鑰">
        </div>
      </div>
      <div class="mt-8 flex justify-end space-x-3">
        <button onclick="document.getElementById('settings-modal').classList.add('hidden')" class="px-4 py-2 bg-slate-200 rounded-xl">取消</button>
        <button onclick="saveSettings()" class="px-6 py-2 bg-indigo-600 text-white rounded-xl">儲存設定</button>
      </div>
    </div>
  </div>

  <script>
    function saveSettings() {
      const key = document.getElementById('cfg-api-key').value.trim();
      localStorage.setItem('gemini_api_key', key);
      alert("設定已儲存！");
      document.getElementById('settings-modal').classList.add('hidden');
    }

    window.onload = () => {
      document.getElementById('cfg-api-key').value = localStorage.getItem('gemini_api_key') || "";
    };

    async function startAIEvaluation() {
      const apiKey = localStorage.getItem('gemini_api_key');
      const topic = document.getElementById('writing-topic').value;
      const essay = document.getElementById('essay-content').value;

      if (!apiKey) return alert("請先設定 API Key！");
      document.getElementById('eval-content').innerText = "AI 正在進行詳細評析，請稍候...";
      
      const apiEndpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
      
      try {
        const response = await fetch(apiEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            contents: [{ parts: [{ text: `請模擬學測閱卷老師，對以下題目與作文給予詳細評分。請回傳 JSON 格式：{"score": "XX/20", "comment": "詳細評析內容"}。題目：${topic}，作文：${essay}` }] }],
            generationConfig: { responseMimeType: "application/json" }
          })
        });
        
        const data = await response.json();
        const result = JSON.parse(data.candidates[0].content.parts[0].text);
        
        document.getElementById('score-display').innerText = "分數：" + result.score;
        document.getElementById('eval-content').innerText = result.comment;
      } catch (err) {
        alert("評分異常，請確認金鑰是否有效或次數已達上限。");
      }
    }
  </script>
</body>
</html>
